# NetBox Configuration
base_url = "https://192.168.10.30"
work_dir = "./downloads"

[router]
host = "192.168.1.1"
username = "admin"
port = 22
place_before_comment = "Drop invalid/inter-VLAN forward"

# ============================================================================
# IPAM to Security Module Sync Configuration
# ============================================================================
[ipam_to_security]
limit = 200

# API Endpoints
security_endpoint = "/api/plugins/netbox-security/addresses/"
addresssets_endpoint = "/api/plugins/netbox-security/address-sets/"

# Custom Field Names
backref_field = "ipam_backref"
disable_sync_field = "disable_security_sync"

# Tags
managed_tag = "managed-by-script"
role_caddy_tag = "role:caddy-proxy"
role_subnet_router_tag = "role:tailscale-subnet-router"

# Behavior
require_service_ip_binding = false
strict = false

# Execution Flags (defaults)
apply = false
update = false
show_payload = false
show_http_request = false
suppress_insecure_warning = true
debug = false

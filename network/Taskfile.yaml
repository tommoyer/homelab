version: "3"

vars:
  python: '{{default "python3" .PYTHON}}'

tasks:
  default:
    desc: List available network automation tasks.
    cmds:
      - go-task --list

  deps:install:
    desc: Install Python dependencies for network automation.
    preconditions:
      - sh: "command -v {{.python}} >/dev/null"
        msg: "{{.python}} is required"
    cmds:
      - "{{.python}} -m pip install --upgrade pip"
      - "{{.python}} -m pip install -r requirements.txt"

  dns:generate:
    desc: Generate dnscontrol external_records.json from NetBox DNS records.
    dir: dns
    preconditions:
      - sh: "command -v {{.python}} >/dev/null"
        msg: "{{.python}} is required"
      - sh: "[ -n \"$NETBOX_API_KEY\" ]"
        msg: "NETBOX_API_KEY env var is required"
    cmds:
      - >
        {{.python}} update-dns.py
        --config "{{default "config.toml" .DNS_CONFIG}}"
        {{if .DNS_WORK_DIR}}--work-dir "{{.DNS_WORK_DIR}}"{{end}}
        {{if .DNSCONTROL_DIR}}--dnscontrol-dir "{{.DNSCONTROL_DIR}}"{{end}}
        {{if .DNSCONTROL_BIN}}--dnscontrol-bin "{{.DNSCONTROL_BIN}}"{{end}}
        {{if .DNSCONTROL_RECORDS_PATH}}--dnscontrol-records-path "{{.DNSCONTROL_RECORDS_PATH}}"{{end}}
        {{if .DNSCONTROL_NO_CHECK}}--dnscontrol-no-check{{end}}
        {{if .DEBUG}}--debug{{end}}
        {{.CLI_ARGS}}

  dns:apply:
    desc: Generate + preview + push dnscontrol changes (Cloudflare).
    dir: dns
    preconditions:
      - sh: "command -v {{.python}} >/dev/null"
        msg: "{{.python}} is required"
      - sh: "[ -n \"$NETBOX_API_KEY\" ]"
        msg: "NETBOX_API_KEY env var is required"
    cmds:
      - >
        {{.python}} update-dns.py
        --config "{{default "config.toml" .DNS_CONFIG}}"
        {{if .DNS_WORK_DIR}}--work-dir "{{.DNS_WORK_DIR}}"{{end}}
        {{if .DNSCONTROL_DIR}}--dnscontrol-dir "{{.DNSCONTROL_DIR}}"{{end}}
        {{if .DNSCONTROL_BIN}}--dnscontrol-bin "{{.DNSCONTROL_BIN}}"{{end}}
        {{if .DNSCONTROL_RECORDS_PATH}}--dnscontrol-records-path "{{.DNSCONTROL_RECORDS_PATH}}"{{end}}
        {{if .DNSCONTROL_NO_CHECK}}--dnscontrol-no-check{{end}}
        {{if .DEBUG}}--debug{{end}}
        --apply
        {{.CLI_ARGS}}

  dns:refresh:
    desc: Retransfer BIND zones + reload Pi-hole DNS (SSH).
    dir: dns
    preconditions:
      - sh: "command -v ssh >/dev/null"
        msg: "ssh is required"
    cmds:
      - "bash refresh-dns.sh"

  caddy:generate:
    desc: Generate a Caddyfile from NetBox Services.
    dir: caddy
    preconditions:
      - sh: "command -v {{.python}} >/dev/null"
        msg: "{{.python}} is required"
      - sh: "[ -n \"$NETBOX_API_KEY\" ]"
        msg: "NETBOX_API_KEY env var is required"
    cmds:
      - >
        {{.python}} update-caddy.py
        --config "{{default "config.toml" .CADDY_CONFIG}}"
        --template "{{default "Caddyfile.template" .CADDY_TEMPLATE}}"
        {{if .CADDY_WORK_DIR}}--work-dir "{{.CADDY_WORK_DIR}}"{{end}}
        {{if .CADDY_ENABLED}}--enabled "{{.CADDY_ENABLED}}"{{end}}
        {{if .CADDY_LIMIT}}--limit "{{.CADDY_LIMIT}}"{{end}}
        {{if .DEBUG}}--debug{{end}}
        {{.CLI_ARGS}}

  caddy:apply:
    desc: Generate + upload + restart Caddy (uses config.toml unless overridden).
    dir: caddy
    preconditions:
      - sh: "command -v {{.python}} >/dev/null"
        msg: "{{.python}} is required"
      - sh: "[ -n \"$NETBOX_API_KEY\" ]"
        msg: "NETBOX_API_KEY env var is required"
      - sh: "command -v ssh >/dev/null"
        msg: "ssh is required"
    cmds:
      - >
        {{.python}} update-caddy.py
        --config "{{default "config.toml" .CADDY_CONFIG}}"
        --template "{{default "Caddyfile.template" .CADDY_TEMPLATE}}"
        {{if .CADDY_WORK_DIR}}--work-dir "{{.CADDY_WORK_DIR}}"{{end}}
        {{if .CADDY_ENABLED}}--enabled "{{.CADDY_ENABLED}}"{{end}}
        {{if .CADDY_LIMIT}}--limit "{{.CADDY_LIMIT}}"{{end}}
        {{if .CADDY_HOST}}--caddy-host "{{.CADDY_HOST}}"{{end}}
        {{if .CADDY_USERNAME}}--caddy-username "{{.CADDY_USERNAME}}"{{end}}
        {{if .CADDY_PORT}}--caddy-port "{{.CADDY_PORT}}"{{end}}
        {{if .CADDY_PATH}}--caddy-path "{{.CADDY_PATH}}"{{end}}
        {{if .CADDY_RESTART}}--caddy-restart "{{.CADDY_RESTART}}"{{end}}
        {{if .DEBUG}}--debug{{end}}
        --apply
        {{.CLI_ARGS}}

  mikrotik:security:dry:
    desc: Dry-run sync IPAM objects to NetBox Security (no writes).
    dir: mikrotik
    preconditions:
      - sh: "command -v {{.python}} >/dev/null"
        msg: "{{.python}} is required"
      - sh: "[ -n \"$NETBOX_API_KEY\" ]"
        msg: "NETBOX_API_KEY env var is required"
    cmds:
      - >
        {{.python}} ipam-to-security.py
        --config "{{default "config.toml" .SEC_CONFIG}}"
        {{if .SEC_LIMIT}}--limit "{{.SEC_LIMIT}}"{{end}}
        {{if .SECURITY_ENDPOINT}}--security-endpoint "{{.SECURITY_ENDPOINT}}"{{end}}
        {{if .BACKREF_FIELD}}--backref-field "{{.BACKREF_FIELD}}"{{end}}
        {{if .AUTOMATION_KEY_FIELD}}--automation-key-field "{{.AUTOMATION_KEY_FIELD}}"{{end}}
        {{if .SHOW_PAYLOAD}}--show-payload{{end}}
        {{if .SHOW_HTTP_REQUEST}}--show-http-request{{end}}
        {{if .SUPPRESS_INSECURE_WARNING}}--suppress-insecure-warning{{end}}
        {{if .DEBUG}}--debug{{end}}
        {{.CLI_ARGS}}

  mikrotik:security:apply:
    desc: Create/update NetBox Security addresses/sets (writes).
    dir: mikrotik
    preconditions:
      - sh: "command -v {{.python}} >/dev/null"
        msg: "{{.python}} is required"
      - sh: "[ -n \"$NETBOX_API_KEY\" ]"
        msg: "NETBOX_API_KEY env var is required"
    cmds:
      - >
        {{.python}} ipam-to-security.py
        --config "{{default "config.toml" .SEC_CONFIG}}"
        {{if .SEC_LIMIT}}--limit "{{.SEC_LIMIT}}"{{end}}
        {{if .SECURITY_ENDPOINT}}--security-endpoint "{{.SECURITY_ENDPOINT}}"{{end}}
        {{if .BACKREF_FIELD}}--backref-field "{{.BACKREF_FIELD}}"{{end}}
        {{if .AUTOMATION_KEY_FIELD}}--automation-key-field "{{.AUTOMATION_KEY_FIELD}}"{{end}}
        {{if .SHOW_PAYLOAD}}--show-payload{{end}}
        {{if .SHOW_HTTP_REQUEST}}--show-http-request{{end}}
        {{if .SUPPRESS_INSECURE_WARNING}}--suppress-insecure-warning{{end}}
        {{if .DEBUG}}--debug{{end}}
        --apply
        {{.CLI_ARGS}}

  mikrotik:security:apply-update:
    desc: Create/update + update existing objects by backref/automation_key (writes).
    dir: mikrotik
    preconditions:
      - sh: "command -v {{.python}} >/dev/null"
        msg: "{{.python}} is required"
      - sh: "[ -n \"$NETBOX_API_KEY\" ]"
        msg: "NETBOX_API_KEY env var is required"
    cmds:
      - >
        {{.python}} ipam-to-security.py
        --config "{{default "config.toml" .SEC_CONFIG}}"
        {{if .SEC_LIMIT}}--limit "{{.SEC_LIMIT}}"{{end}}
        {{if .SECURITY_ENDPOINT}}--security-endpoint "{{.SECURITY_ENDPOINT}}"{{end}}
        {{if .BACKREF_FIELD}}--backref-field "{{.BACKREF_FIELD}}"{{end}}
        {{if .AUTOMATION_KEY_FIELD}}--automation-key-field "{{.AUTOMATION_KEY_FIELD}}"{{end}}
        {{if .SHOW_PAYLOAD}}--show-payload{{end}}
        {{if .SHOW_HTTP_REQUEST}}--show-http-request{{end}}
        {{if .SUPPRESS_INSECURE_WARNING}}--suppress-insecure-warning{{end}}
        {{if .DEBUG}}--debug{{end}}
        --apply
        --update
        {{.CLI_ARGS}}

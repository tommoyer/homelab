schema_version: 1
services:
- service_id: proxmox-tcp8006
  name: Proxmox Proxy
  asset_id: proxmox
  vlan_id: homelab
  interface_id: homelab
  ports:
    service_ports:
    - port: 8006
      proto: tcp
    firewall_ports:
    - port: 80
      proto: tcp
    - port: 443
      proto: tcp
  routing:
    via_caddy: true
    internal_dns_target: 192.168.20.3
  backend:
    ip: null
    port: 8006

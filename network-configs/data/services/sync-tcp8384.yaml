schema_version: 1
services:
- service_id: sync-tcp8384
  name: Syncthing
  asset_id: sync
  vlan_id: homelab
  interface_id: homelab
  ports:
    service_ports:
    - port: 8384
      proto: tcp
    - port: 22000
      proto: tcp
    - port: 22000
      proto: udp
    firewall_ports:
    - port: 80
      proto: tcp
    - port: 443
      proto: tcp
  routing:
    via_caddy: true
    internal_dns_target: 192.168.20.3
  backend:
    ip: null
    port: 8384

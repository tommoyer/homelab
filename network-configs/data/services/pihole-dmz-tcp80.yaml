schema_version: 1
services:
- service_id: pihole-dmz-tcp80
  name: Pihole (DMZ)
  asset_id: pihole-dmz
  vlan_id: dmz
  interface_id: dmz
  ports:
    service_ports:
    - port: 80
      proto: tcp
    firewall_ports:
    - port: 80
      proto: tcp
    - port: 443
      proto: tcp
  routing:
    via_caddy: true
    internal_dns_target: 192.168.20.3
  backend:
    ip: null
    port: 80

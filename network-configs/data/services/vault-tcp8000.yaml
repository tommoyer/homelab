schema_version: 1
services:
- service_id: vault-tcp8000
  name: Vaultwarden
  asset_id: vault
  vlan_id: homelab
  interface_id: homelab
  ports:
    service_ports:
    - port: 8000
      proto: tcp
    firewall_ports:
    - port: 80
      proto: tcp
    - port: 443
      proto: tcp
  routing:
    via_caddy: true
    internal_dns_target: 192.168.20.3
  backend:
    ip: null
    port: 8000

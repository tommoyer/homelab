schema_version: 1
globals:
  base_domain: moyer.wtf
  user_vlan: hivemind
  access_publish_to_user_vlan: true
  caddy_ip: 192.168.20.3
vlans:
- vlan_id: hivemind
  vlan_tag: 1
  cidr: 192.168.1.0/24
  dns:
    default_provider: pihole
    include_access_fqdn: true
  suffixes:
    infra: hivemind.moyer.wtf
    access: moyer.wtf
  servers:
    dns_host: 192.168.1.4
    dns_type: pihole
    ssh_user: tom-tom
    ssh_port: 22
    use_sudo: true
- vlan_id: homelab
  vlan_tag: 10
  cidr: 192.168.10.0/24
  dns:
    default_provider: pihole
    include_access_fqdn: false
  suffixes:
    infra: homelab.moyer.wtf
    access: moyer.wtf
  servers:
    dns_host: 192.168.10.27
    dns_type: pihole
    ssh_user: root
    ssh_port: 22
    use_sudo: false
- vlan_id: dmz
  vlan_tag: 20
  cidr: 192.168.20.0/24
  dns:
    default_provider: pihole
    include_access_fqdn: false
  suffixes:
    infra: dmz.moyer.wtf
    access: moyer.wtf
  servers:
    dns_host: 192.168.20.2
    dns_type: pihole
    ssh_user: root
    ssh_port: 22
    use_sudo: false
- vlan_id: shady
  vlan_tag: 30
  cidr: null
  dns:
    default_provider: mikrotik
    include_access_fqdn: false
  suffixes:
    infra: shady.moyer.wtf
    access: moyer.wtf
  servers:
    dns_host: ''
    dns_type: mikrotik
    ssh_user: root
    ssh_port: 22
    use_sudo: false

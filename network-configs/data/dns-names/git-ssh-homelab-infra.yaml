schema_version: 1
dns_names:
- dns_id: git-ssh-homelab-infra
  kind: infra
  fqdn: git-ssh.homelab.moyer.wtf
  targets:
    service_id: null
    asset_id: git-ssh
  internal:
    enabled: true
    provider: inherit_vlan
    address: asset_interface_ip
    record_type: A
    interface_id: homelab
    publish_scopes:
    - self
  external:
    enabled: false

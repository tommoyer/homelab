version: "3"

vars:
  host: '{{default "root@tw-sync.homelab.moyer.wtf" .TWSYNC_HOST}}'
  dest: '{{default "/opt/tw-sync" .TWSYNC_PATH}}'

tasks:
  bootstrap:
    desc: Ensure the destination exists and a .env file is present.
    preconditions:
      - sh: "command -v ssh >/dev/null"
        msg: "ssh is required"
    cmds:
      - ssh {{.host}} "mkdir -p {{.dest}}"
      - ssh {{.host}} "cd {{.dest}} && if [ ! -f .env ]; then if [ -f env.example ]; then cp env.example .env; else touch .env; fi; fi"

  sync:
    desc: Copy tw-sync files to the remote host (excluding .env).
    preconditions:
      - sh: "command -v tar >/dev/null"
        msg: "tar is required"
      - sh: "command -v ssh >/dev/null"
        msg: "ssh is required"
    cmds:
      - ssh {{.host}} "mkdir -p {{.dest}}"
      - tar --exclude='.env' -cf - . | ssh {{.host}} "tar -xf - -C {{.dest}}"

  up:
    desc: Start the sync services via docker compose on the remote host.
    deps:
      - bootstrap
    preconditions:
      - sh: "command -v ssh >/dev/null"
        msg: "ssh is required"
    cmds:
      - ssh {{.host}} "cd {{.dest}} && docker compose up -d"

  pull:
    desc: Pull/build latest images and restart containers.
    deps:
      - bootstrap
    preconditions:
      - sh: "command -v ssh >/dev/null"
        msg: "ssh is required"
    cmds:
      - ssh {{.host}} "cd {{.dest}} && docker compose pull && docker compose up -d --build"

  deploy:
    desc: Sync files then start the services.
    deps:
      - sync
    cmds:
      - task: pull
    silent: true

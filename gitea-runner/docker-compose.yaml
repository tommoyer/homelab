version: "3.8"

services:
  gitea-act-runner:
    image: gitea/act_runner:latest
    container_name: gitea-act-runner
    restart: unless-stopped

    # Replace these with your values or use an .env file
    environment:
      environment:
      # URL of your Gitea instance (must be reachable from the runner)
      GITEA_INSTANCE_URL: "${INSTANCE_URL}"
      # Runner registration token from Gitea (Admin → Runners or CLI)
      GITEA_RUNNER_REGISTRATION_TOKEN: "${REGISTRATION_TOKEN}"
      # Optional: customize runner name and labels
      GITEA_RUNNER_NAME: "${RUNNER_NAME}"
      GITEA_RUNNER_LABELS: "${RUNNER_LABELS}"
      # Optional: use a config file if you generated one
      CONFIG_FILE: /config.yaml

    volumes:
      # Persist runner data (e.g. cache, internal DB)
      - ./data:/data
      # Optional config file (if you used `act_runner generate-config > config.yaml`)
      - ./config.yaml:/config.yaml
      # Give the runner access to the host Docker daemon for job containers
      - /var/run/docker.sock:/var/run/docker.sock

    # If you use a custom network with Gitea, put the runner on it too:
    # networks:
    #   - gitea

# networks:
#   gitea:
#     external: true


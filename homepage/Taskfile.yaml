version: "3"

vars:
  host: '{{default "root@home.homelab.moyer.wtf" .HOMEPAGE_HOST}}'
  dest: '{{default "/opt/homepage/config" .HOMEPAGE_PATH}}'

tasks:
  sync:
    desc: Copy Homepage config to the remote host
    preconditions:
      - sh: "command -v tar >/dev/null"
        msg: "tar is required"
      - sh: "command -v ssh >/dev/null"
        msg: "ssh is required"
    cmds:
      - ssh {{.host}} "mkdir -p {{.dest}}"
      - tar --exclude='.env' --exclude='Taskfile.yaml' -cf - . | ssh {{.host}} "tar -xf - -C {{.dest}}"

  deploy:
    desc: Sync files then build and start Homepage.
    cmds:
      - task: sync
    silent: true

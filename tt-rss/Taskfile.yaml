version: "3"

vars:
  host: '{{default "root@news.homelab.moyer.wtf" .TTRSS_HOST}}'
  dest: '{{default "/opt/tt-rss" .TTRSS_PATH}}'

tasks:
  sync:
    desc: Copy tt-rss files to the remote host (excluding .env).
    preconditions:
      - sh: "command -v tar >/dev/null"
        msg: "tar is required"
      - sh: "command -v ssh >/dev/null"
        msg: "ssh is required"
    cmds:
      - ssh {{.host}} "mkdir -p {{.dest}}"
      - tar -cf - . | ssh {{.host}} "tar -xf - -C {{.dest}}"

  up:
    desc: Build and start tt-rss via docker compose on the remote host.
    preconditions:
      - sh: "command -v ssh >/dev/null"
        msg: "ssh is required"
    cmds:
      - ssh {{.host}} "cd {{.dest}} && docker compose up --build -d"

  deploy:
    desc: Sync files then build and start tt-rss.
    deps:
      - sync
    cmds:
      - task: up
    silent: true

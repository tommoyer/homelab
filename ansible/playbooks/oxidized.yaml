---
# Deploy a Docker Compose service to hosts with the "docker" role.
#
# For each targeted host this playbook expects:
#   templates/<hostname>-docker-compose.yaml   (required, Jinja2)
#   templates/<hostname>/*.env.j2              (optional, Jinja2 – skipped if absent)
#
# Usage:
#   ansible-playbook playbooks/docker-compose.yaml
#   ansible-playbook playbooks/docker-compose.yaml --limit myhost
#   ansible-playbook playbooks/docker-compose.yaml -e service_name=myapp
#
# Variables:
#   service_name        Name of the service directory under compose_base_dir.
#                       Defaults to inventory_hostname.
#   compose_base_dir    Parent directory for all services. Default: /home/ansible
#
- name: Deploy Docker Compose service
  hosts: "{{ target_hosts | default('oxidizeds') }}"
  gather_facts: yes
  become: yes

  vars:
    service_name: "{{ inventory_hostname }}"
    compose_base_dir: /home/ansible
    compose_deploy_dir: "{{ compose_base_dir }}/{{ service_name }}"
    _compose_template: "{{ playbook_dir }}/../files/{{ inventory_hostname }}/docker-compose.yaml"
    _env_template_dir: "{{ playbook_dir }}/../templates/oxidized"
    _env_template_glob: "{{ _env_template_dir }}/*.env.j2"
    oxidized_config_dir: "{{ compose_deploy_dir }}"
    oxidized_router_group: routeros
    oxidized_model: routeros

  vars_files:
    # ansible-vault encrypted; must define oxidized_password
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yaml"

  tasks:
    # -------------------------------------------------------------------------
    # Pre-flight checks (run on controller, not on the remote host)
    # -------------------------------------------------------------------------
    - name: Check whether docker-compose template exists on controller
      ansible.builtin.stat:
        path: "{{ _compose_template }}"
      delegate_to: localhost
      become: false
      register: _compose_template_stat

    - name: Fail when no compose template found for host
      ansible.builtin.fail:
        msg: >-
          No compose template found for host '{{ inventory_hostname }}'.
          Expected: {{ _compose_template }}
      when: not _compose_template_stat.stat.exists

    - name: Check whether env template directory exists on controller
      ansible.builtin.stat:
        path: "{{ _env_template_dir }}"
      delegate_to: localhost
      become: false
      register: _env_template_dir_stat

    - name: Discover env templates on controller
      ansible.builtin.set_fact:
        _env_templates: "{{ query('fileglob', _env_template_glob) | sort }}"
      when: _env_template_dir_stat.stat.exists and _env_template_dir_stat.stat.isdir

    - name: Validate required Oxidized variables
      ansible.builtin.assert:
        that:
          - oxidized_password is defined
          - (oxidized_password | string | length) > 0
          - oxidized_username is defined
          - (oxidized_username | string | length) > 0
        fail_msg: >-
          Missing required Oxidized credentials. Ensure vault variable
          'oxidized_password' and variable 'oxidized_username' are defined.

    - name: Ensure router group exists and has devices
      ansible.builtin.assert:
        that:
          - groups[oxidized_router_group] is defined
          - (groups[oxidized_router_group] | length) > 0
        fail_msg: >-
          Inventory group '{{ oxidized_router_group }}' is missing or empty.
          Add RouterOS devices to that group to generate router.db.

    - name: Validate RouterOS devices have host_ip addresses
      ansible.builtin.assert:
        that:
          - hostvars[item].host_ip is defined
          - hostvars[item].host_ip | regex_search('^\\d{1,3}(\\.\\d{1,3}){3}$') is not none
        fail_msg: >-
          Host '{{ item }}' in group '{{ oxidized_router_group }}' must define
          a numeric IPv4 'host_ip' for Oxidized router.db generation.
      loop: "{{ groups[oxidized_router_group] }}"
      loop_control:
        label: "{{ item }}"

    # -------------------------------------------------------------------------
    # Directory layout
    # -------------------------------------------------------------------------
    - name: Ensure service directory exists
      ansible.builtin.file:
        path: "{{ compose_deploy_dir }}"
        state: directory
        owner: ansible
        group: ansible
        mode: "0750"

    - name: Ensure env directory exists
      ansible.builtin.file:
        path: "{{ compose_deploy_dir }}/env"
        state: directory
        owner: ansible
        group: ansible
        mode: "0750"
      when: _env_template_dir_stat.stat.exists and _env_template_dir_stat.stat.isdir

    # -------------------------------------------------------------------------
    # Deploy compose file and optional env files
    # -------------------------------------------------------------------------
    - name: Deploy docker-compose.yaml
      ansible.builtin.template:
        src: "{{ _compose_template }}"
        dest: "{{ compose_deploy_dir }}/docker-compose.yaml"
        owner: ansible
        group: ansible
        mode: "0640"
      register: _compose_file

    - name: Deploy env files
      ansible.builtin.template:
        src: "{{ item }}"
        dest: "{{ compose_deploy_dir }}/env/{{ item | basename | regex_replace('\\.j2$', '') }}"
        owner: ansible
        group: ansible
        mode: "0600"
      loop: "{{ _env_templates | default([]) }}"
      when: _env_template_dir_stat.stat.exists and _env_template_dir_stat.stat.isdir
      register: _env_files

    # -------------------------------------------------------------------------
    # Oxidized configuration files
    # -------------------------------------------------------------------------
    - name: Deploy oxidized config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/oxidized/config.j2"
        dest: "{{ oxidized_config_dir }}/config"
        owner: root
        group: root
        mode: "0640"
      notify: Restart oxidized container

    - name: Deploy oxidized router.db inventory
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/oxidized/inventory.j2"
        dest: "{{ oxidized_config_dir }}/router.db"
        owner: root
        group: root
        mode: "0640"
      notify: Restart oxidized container

    # -------------------------------------------------------------------------
    # Pull images and (re)start services
    # -------------------------------------------------------------------------
    - name: Pull Docker images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ compose_deploy_dir }}"
      register: _compose_pull
      changed_when: "'Pulled' in _compose_pull.stdout"

    - name: Start services (docker compose up -d)
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ compose_deploy_dir }}"
      register: _compose_up
      changed_when: >-
        'Started' in _compose_up.stdout or
        'Created' in _compose_up.stdout or
        'Recreated' in _compose_up.stdout

  handlers:
    - name: Restart oxidized container
      ansible.builtin.command:
        cmd: docker compose restart oxidized
        chdir: "{{ compose_deploy_dir }}"

---
# Configure Debian/Ubuntu hosts to use apt-cacher-ng proxy.
#
# This playbook sets up apt to route package downloads through a
# local apt-cacher-ng instance, reducing bandwidth usage and
# accelerating package installation on repeat deployments.
#
# Requires the following group variable to be defined:
#   apt_cacher_ng_url: "http://cacher-host:3142"
#
# Usage:
#   ansible-playbook playbooks/apt-cacher-ng-client.yaml
#   ansible-playbook playbooks/apt-cacher-ng-client.yaml --limit myhost
#   ansible-playbook playbooks/apt-cacher-ng-client.yaml -e apt_cacher_ng_url=http://cache.local:3142
#
- name: Configure apt-cacher-ng client
  hosts: "{{ target_hosts | default('apt_cacher_ng_clients') }}"
  gather_facts: yes
  become: yes

  vars:
    apt_cacher_ng_url_resolved: "{{ apt_cacher_ng_url | default('http://apt-cache.homelab.moyer.wtf:3142') }}"
    apt_cacher_ng_config_file: /etc/apt/apt.conf.d/02-apt-cacher-ng

  tasks:
    - name: Create apt-cacher-ng proxy configuration
      ansible.builtin.copy:
        dest: "{{ apt_cacher_ng_config_file }}"
        content: |
          // Proxy configuration for apt-cacher-ng
          // Managed by Ansible - do not edit manually
          Acquire::http::Proxy "{{ apt_cacher_ng_url_resolved }}";
          Acquire::https::Proxy "{{ apt_cacher_ng_url_resolved }}";
          Acquire::ftp::Proxy "{{ apt_cacher_ng_url_resolved }}";
        owner: root
        group: root
        mode: '0644'
      notify: Update apt cache

  handlers:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 0

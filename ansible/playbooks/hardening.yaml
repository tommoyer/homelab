---
- name: System hardening and good hygiene
  hosts: "{{ target_hosts | default('all') }}"
  become: yes
  vars:
    ssh_permit_root_login: "prohibit-password"
    ssh_password_authentication: "no"
    ssh_pubkey_authentication: "yes"
    ssh_challenge_response_authentication: "no"
    hardening_manage_root_authorized_key: true
    hardening_root_ssh_pubkey_path: "~/.ssh/id_rsa.pub"
    hardening_root_ssh_key: "{{ lookup('file', hardening_root_ssh_pubkey_path) }}"  # Control node public key
    # authentik_url: "https://authentik.yourdomain.com"
    # authentik_ldap_uri: "ldap://authentik.yourdomain.com:389"
    # authentik_ldap_base_dn: "dc=ldap,dc=goauthentik,dc=io"
  
  tasks:
    - name: Update and upgrade all packages
      apt:
        upgrade: dist
        update_cache: yes
        cache_valid_time: 3600
        autoremove: yes
        autoclean: yes
      when: ansible_os_family == "Debian"

    - name: Install security and authentication packages
      apt:
        name:
          - unattended-upgrades
          - fail2ban
          - ufw
          - libpam-ldap
          - libnss-ldap
          - nscd
          - sssd
          - sssd-ldap
        state: present

    - name: Add SSH key to root authorized_keys
      ansible.posix.authorized_key:
        user: root
        state: present
        key: "{{ hardening_root_ssh_key }}"
        manage_dir: true
        exclusive: false
      when:
        - hardening_manage_root_authorized_key | bool

    # - name: Configure automatic security updates
    #   copy:
    #     content: |
    #       APT::Periodic::Update-Package-Lists "1";
    #       APT::Periodic::Download-Upgradeable-Packages "1";
    #       APT::Periodic::AutocleanInterval "7";
    #       APT::Periodic::Unattended-Upgrade "1";
    #     dest: /etc/apt/apt.conf.d/20auto-upgrades
    #     mode: '0644'

    - name: Harden SSH configuration
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        validate: 'sshd -t -f %s'
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin {{ ssh_permit_root_login }}' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication {{ ssh_pubkey_authentication }}' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication {{ ssh_password_authentication }}' }
        - { regexp: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication {{ ssh_challenge_response_authentication }}' }
        - { regexp: '^#?PermitEmptyPasswords', line: 'PermitEmptyPasswords no' }
        - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
        - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
        - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
      notify: restart sshd

    # - name: Configure firewall (UFW) - allow SSH
    #   ufw:
    #     rule: allow
    #     port: '22'
    #     proto: tcp

    # - name: Enable UFW
    #   ufw:
    #     state: enabled
    #     policy: deny

    - name: Start and enable fail2ban
      systemd:
        name: fail2ban
        state: started
        enabled: yes

    # - name: Configure SSSD for Authentik LDAP
    #   template:
    #     src: ../templates/sssd.conf.j2
    #     dest: /etc/sssd/sssd.conf
    #     mode: '0600'
    #     owner: root
    #     group: root
    #   notify: restart sssd
    #   when: "'authentik_managed' in group_names"

    # - name: Enable SSSD service
    #   systemd:
    #     name: sssd
    #     state: started
    #     enabled: yes
    #   when: "'authentik_managed' in group_names"

  handlers:
    - name: restart sshd
      systemd:
        name: sshd
        state: restarted

    - name: restart sssd
      systemd:
        name: sssd
        state: restarted
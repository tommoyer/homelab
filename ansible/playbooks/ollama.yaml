# Ansible playbook to enable non-free repos, install firmware-amd-graphics, and install ROCm on Debian 13 (Trixie)
- hosts: "{{ target_hosts | default('ollama') }}"
  become: true
  vars:
    rocm_version: "7.2.1"
  tasks:
    - name: Check if legacy apt sources.list exists
      ansible.builtin.stat:
        path: /etc/apt/sources.list
      register: sources_list_stat

    - name: Enable contrib and non-free repositories in sources.list
      ansible.builtin.replace:
        path: /etc/apt/sources.list
        regexp: '^(deb(?:-src)?\s+\S+\s+\S+\s+)main(?:\s+.*)?$'
        replace: '\1main contrib non-free non-free-firmware'
      when: sources_list_stat.stat.exists

    - name: Check if deb822 apt sources file exists
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/debian.sources
      register: deb822_sources_stat

    - name: Enable contrib and non-free repositories in debian.sources
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/debian.sources
        regexp: '^Components:\s*main(?:\s+\S+)*$'
        replace: 'Components: main contrib non-free non-free-firmware'
      when: deb822_sources_stat.stat.exists

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install key and tooling prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - gnupg
          - wget
        state: present

    - name: Install firmware-amd-graphics
      ansible.builtin.apt:
        name: firmware-amd-graphics
        state: present

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download ROCm signing key (ASCII armored)
      ansible.builtin.get_url:
        url: https://repo.radeon.com/rocm/rocm.gpg.key
        dest: /etc/apt/keyrings/rocm.gpg.key
        mode: '0644'

    - name: Convert ROCm signing key to keyring format
      ansible.builtin.command:
        cmd: gpg --dearmor --yes --output /etc/apt/keyrings/rocm.gpg /etc/apt/keyrings/rocm.gpg.key
      args:
        creates: /etc/apt/keyrings/rocm.gpg

    - name: Add ROCm package repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/{{ rocm_version }} noble main"
        state: present
        filename: rocm

    - name: Add AMD graphics repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/graphics/{{ rocm_version }}/ubuntu noble main"
        state: present
        filename: rocm

    - name: Pin AMD repository priority
      ansible.builtin.copy:
        dest: /etc/apt/preferences.d/rocm-pin-600
        mode: '0644'
        content: |
          Package: *
          Pin: release o=repo.radeon.com
          Pin-Priority: 600

    - name: Update apt cache after adding ROCm repo
      ansible.builtin.apt:
        update_cache: yes

    - name: Install ROCm packages
      ansible.builtin.apt:
        name:
          - rocm
          - rocm-libs
          - rocm-dev
        state: present

    - name: Reboot notice
      ansible.builtin.debug:
        msg: "ROCm and firmware installed. A reboot may be required for changes to take effect."

- hosts: "{{ target_hosts | default('ollama') }}"
  become: true
  vars:
    ollama_service_user: ollama
    ollama_service_group: ollama
    ollama_service_home: /var/lib/ollama
    ollama_models_dir: /var/lib/ollama/.ollama/models
    ollama_host: 0.0.0.0:11434
    ollama_exec_path: /usr/bin/ollama
    ollama_standard_package_url: https://ollama.com/download/ollama-linux-amd64.tar.zst
    ollama_standard_archive_path: /tmp/ollama-linux-amd64.tar.zst
    ollama_rocm_package_url: https://ollama.com/download/ollama-linux-amd64-rocm.tar.zst
    ollama_rocm_archive_path: /tmp/ollama-linux-amd64-rocm.tar.zst
    ollama_install_prefix: /usr
    ollama_rocm_lib_candidates:
      - /usr/lib/ollama/rocm
      - /usr/lib/ollama/rocm/lib
      - /usr/local/lib/ollama/rocm
      - /usr/lib/ollama/lib/rocm
      - /usr/local/lib/ollama/rocm/lib
      - /usr/local/lib/ollama/lib/rocm
  tasks:
    - name: Install archive prerequisites
      ansible.builtin.apt:
        name:
          - zstd
        state: present

    - name: Download standard ollama package
      ansible.builtin.get_url:
        url: "{{ ollama_standard_package_url }}"
        dest: "{{ ollama_standard_archive_path }}"
        mode: '0644'

    - name: Extract standard ollama package to /usr
      ansible.builtin.unarchive:
        src: "{{ ollama_standard_archive_path }}"
        dest: "{{ ollama_install_prefix }}"
        remote_src: true

    - name: Download extra ollama ROCm package
      ansible.builtin.get_url:
        url: "{{ ollama_rocm_package_url }}"
        dest: "{{ ollama_rocm_archive_path }}"
        mode: '0644'

    - name: Extract ROCm add-on package to /usr
      ansible.builtin.unarchive:
        src: "{{ ollama_rocm_archive_path }}"
        dest: "{{ ollama_install_prefix }}"
        remote_src: true

    - name: Probe ROCm runtime candidate directories
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ ollama_rocm_lib_candidates }}"
      register: ollama_rocm_candidate_stats

    - name: Select detected ROCm runtime library path
      ansible.builtin.set_fact:
        ollama_rocm_lib_path: >-
          {{
            (
              ollama_rocm_candidate_stats.results
              | selectattr('stat.exists', 'equalto', true)
              | selectattr('stat.isdir', 'equalto', true)
              | map(attribute='stat.path')
              | list
              | first
            ) | default('')
          }}

    - name: Fail if ROCm runtime directory is missing
      ansible.builtin.assert:
        that:
          - ollama_rocm_lib_path | length > 0
        fail_msg: "ROCm Ollama runtime was not found in any candidate path: {{ ollama_rocm_lib_candidates | join(', ') }}"

    - name: Set ROCm runtime root path
      ansible.builtin.set_fact:
        ollama_rocm_root_path: "{{ ollama_rocm_lib_path | dirname }}"

    - name: Verify ollama executable exists
      ansible.builtin.stat:
        path: "{{ ollama_exec_path }}"
      register: ollama_exec_stat

    - name: Fail if ollama executable is missing
      ansible.builtin.assert:
        that:
          - ollama_exec_stat.stat.exists
          - ollama_exec_stat.stat.executable
        fail_msg: "Ollama executable not found at {{ ollama_exec_path }} after archive install."

    - name: Ensure ollama group exists
      ansible.builtin.group:
        name: "{{ ollama_service_group }}"
        system: true
        state: present

    - name: Ensure render group exists
      ansible.builtin.group:
        name: render
        state: present

    - name: Ensure video group exists
      ansible.builtin.group:
        name: video
        state: present

    - name: Ensure ollama user exists
      ansible.builtin.user:
        name: "{{ ollama_service_user }}"
        group: "{{ ollama_service_group }}"
        groups:
          - render
          - video
        append: true
        home: "{{ ollama_service_home }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: true
        state: present

    - name: Ensure ollama models directory exists
      ansible.builtin.file:
        path: "{{ ollama_models_dir }}"
        state: directory
        owner: "{{ ollama_service_user }}"
        group: "{{ ollama_service_group }}"
        mode: '0755'

    - name: Install ollama systemd unit
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/ollama.service.j2"
        dest: /etc/systemd/system/ollama.service
        owner: root
        group: root
        mode: '0644'
      register: ollama_unit

    - name: Reload systemd daemon when unit changes
      ansible.builtin.systemd_service:
        daemon_reload: true
      when: ollama_unit.changed

    - name: Restart ollama service when unit changes
      ansible.builtin.systemd_service:
        name: ollama
        state: restarted
      when: ollama_unit.changed

    - name: Enable and start ollama service
      ansible.builtin.systemd_service:
        name: ollama
        enabled: true
        state: started


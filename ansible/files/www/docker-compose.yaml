services:
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    environment:
      - CONTAINERS=1   # Allows read-only access to container list and status
      - POST=0         # Blocks write commands for security
    ports:
      - "2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  web:
    image: gitea.priv.moyer.wtf/tmoyer/www:latest
    ports:
      - "8080:8080"
    restart: unless-stopped
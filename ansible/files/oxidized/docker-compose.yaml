services:
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    environment:
      - CONTAINERS=1   # Allows read-only access to container list and status
      - POST=0         # Blocks write commands for security
    ports:
      - "2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  oxidized:
    restart: always
    image: docker.io/oxidized/oxidized:latest
    ports:
      - 8888:8888/tcp
    environment:
      # Reload hosts list once per day
      CONFIG_RELOAD_INTERVAL: 86400
    volumes:
      - /home/ansible/oxidized:/home/oxidized/.config/oxidized/
version: "3"

vars:
  inventory: '{{default "./inventory/inventory-spreadsheet.py" .ANSIBLE_INVENTORY}}'
  bootstrap_user: '{{default "root" .BOOTSTRAP_USER}}'
  bootstrap_private_key: '{{default "" .BOOTSTRAP_PRIVATE_KEY}}'
  # Targeting:
  # - TARGET_HOSTS controls the play's `hosts:` (supports host patterns like `pve`, `node1`, `node1,node2`, `pve:&prod`, etc.)
  # - ANSIBLE_LIMIT applies an additional `--limit` restriction (same pattern syntax)
  # Back-compat: BOOTSTRAP_LIMIT is treated as ANSIBLE_LIMIT for the bootstrap task.
  target_hosts: '{{default "" .TARGET_HOSTS}}'
  ansible_limit: '{{default (default "" .BOOTSTRAP_LIMIT) .ANSIBLE_LIMIT}}'
  bootstrap_ask_pass: '{{default "1" .BOOTSTRAP_ASK_PASS}}'
  ansible_user: '{{default "ansible" .ANSIBLE_USER}}'

tasks:
  play:
    desc: Run any playbook by name (e.g. PLAYBOOK=hardening go-task play)
    dir: "{{.TASKFILE_DIR}}"
    env:
      ANSIBLE_CONFIG: "{{.TASKFILE_DIR}}/ansible.cfg"
    vars:
      playbook: '{{default "" .PLAYBOOK}}'
    preconditions:
      - sh: "command -v ansible-playbook >/dev/null"
        msg: "ansible-playbook is required"
      - sh: '{{if ne .playbook ""}}test -f playbooks/{{.playbook}}.yaml{{else}}false{{end}}'
        msg: "PLAYBOOK is required and must match a file in playbooks/ (without .yaml extension)"
    cmds:
      - >-
        ansible-playbook
        -i {{.inventory}}
        {{if ne .ansible_limit ""}}--limit {{.ansible_limit}}{{end}}
        {{if ne .target_hosts ""}}-e target_hosts={{.target_hosts}}{{end}}
        {{if ne .ansible_user ""}}-e ansible_user={{.ansible_user}}{{end}}
        {{.CLI_ARGS}}
        playbooks/{{.playbook}}.yaml

  bootstrap:
    desc: Bootstrap nodes for Ansible management (creates ansible user + installs ~/.ssh/ansible.pub).
    dir: "{{.TASKFILE_DIR}}"
    env:
      ANSIBLE_CONFIG: "{{.TASKFILE_DIR}}/ansible.cfg"
    preconditions:
      - sh: "command -v ansible-playbook >/dev/null"
        msg: "ansible-playbook is required"
      - sh: "test -f playbooks/bootstrap.yaml"
        msg: "playbooks/bootstrap.yaml not found (run from ansible/ or fix paths)"
    cmds:
      - >-
        ansible-playbook
        -i {{.inventory}}
        -u {{.bootstrap_user}}
        {{if ne .bootstrap_private_key ""}}--private-key {{.bootstrap_private_key}}{{end}}
        {{if ne .ansible_limit ""}}--limit {{.ansible_limit}}{{end}}
        {{if or (eq .bootstrap_ask_pass "1") (eq .bootstrap_ask_pass "true")}}--ask-pass{{end}}
        --ask-vault-pass
        {{if ne .target_hosts ""}}-e target_hosts={{.target_hosts}}{{end}}
        {{if ne .ansible_user ""}}-e ansible_user={{.ansible_user}}{{end}}
        {{.CLI_ARGS}}
        playbooks/bootstrap.yaml


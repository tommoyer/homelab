- name: Ensure prerequisite packages are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gpg
    state: present
    update_cache: true

- name: Ensure APT trusted key directory exists
  ansible.builtin.file:
    path: /etc/apt/trusted.gpg.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Kanidm PPA signing key
  ansible.builtin.get_url:
    url: https://kanidm.github.io/kanidm_ppa/kanidm_ppa.asc
    dest: /etc/apt/trusted.gpg.d/kanidm_ppa.asc
    owner: root
    group: root
    mode: '0644'

- name: Configure Kanidm PPA apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64,arm64 signed-by=/etc/apt/trusted.gpg.d/kanidm_ppa.asc]
      https://kanidm.github.io/kanidm_ppa
      {{ ansible_distribution_release }}
      {{ kanidm_ppa_component }}
    filename: kanidm_ppa
    state: present

- name: Install Kanidm client packages
  ansible.builtin.apt:
    name: "{{ kanidm_packages }}"
    state: present
    update_cache: true

- name: Ensure /etc/kanidm exists
  ansible.builtin.file:
    path: /etc/kanidm
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Kanidm CA certificate
  ansible.builtin.copy:
    src: "{{ kanidm_ca_src }}"
    dest: "{{ kanidm_ca_dest }}"
    owner: root
    group: root
    mode: "0644"
  notify: Update CA trust

- name: Deploy /etc/kanidm/config
  ansible.builtin.template:
    src: kanidm-config.j2
    dest: /etc/kanidm/config
    owner: root
    group: root
    mode: "0644"
  notify: Restart kanidm-unixd

- name: Deploy /etc/kanidm/unixd
  ansible.builtin.template:
    src: kanidm-unixd.j2
    dest: /etc/kanidm/unixd
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart kanidm-unixd
    - Restart kanidm-unixd-tasks

- name: Install service account token when enabled
  ansible.builtin.copy:
    dest: "{{ kanidm_service_account_token_path }}"
    content: "{{ kanidm_service_account_token | trim }}\n"
    owner: root
    group: root
    mode: "0600"
  when: kanidm_service_account_enabled | bool
  notify: Restart kanidm-unixd

# -----------------------------------------------------------------------------
# NSS: local files must come first so root and system accounts always resolve
# without touching kanidm-unixd.
# -----------------------------------------------------------------------------
- name: Ensure passwd uses files first, then kanidm
  ansible.builtin.lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^passwd:'
    line: "passwd: {{ kanidm_nsswitch_passwd }}"
    backup: true

- name: Ensure group uses files first, then kanidm
  ansible.builtin.lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^group:'
    line: "group: {{ kanidm_nsswitch_group }}"
    backup: true

- name: Deploy Kanidm pam-configs snippet
  ansible.builtin.copy:
    dest: /usr/share/pam-configs/kanidm
    owner: root
    group: root
    mode: "0644"
    content: |
      Name: Kanidm Unix Daemon
      Default: yes
      Priority: 192
      Auth-Type: Primary
      Auth:
              [success=end default=ignore]    pam_kanidm.so ignore_unknown_user
      Account-Type: Primary
      Account:
              [success=end default=ignore]    pam_kanidm.so ignore_unknown_user
      Session-Type: Additional
      Session:
              optional    pam_kanidm.so
  notify: Run pam-auth-update


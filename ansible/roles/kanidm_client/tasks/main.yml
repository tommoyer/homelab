# -----------------------------------------------------------------------------
# SSH drop-in: enable PAM and keyboard-interactive so Kanidm users can log in.
# Note: no `validate` here — sshd -t cannot validate a drop-in fragment in
# isolation; the full config is already validated by hardening.yaml.
# -----------------------------------------------------------------------------
- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Kanidm sshd drop-in
  ansible.builtin.template:
    src: sshd-kanidm.conf.j2
    dest: "{{ kanidm_sshd_dropin }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart ssh

- name: Deploy sudoers rule for Kanidm admin group
  ansible.builtin.template:
    src: sudo-linux-admins.j2
    dest: "{{ kanidm_sudoers_file }}"
    owner: root
    group: root
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"

- name: Enable and start kanidm-unixd
  ansible.builtin.systemd:
    name: kanidm-unixd
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start kanidm-unixd-tasks
  ansible.builtin.systemd:
    name: kanidm-unixd-tasks
    enabled: true
    state: started
    daemon_reload: true

- name: Force Kanidm before pam_unix in common-auth
  ansible.builtin.replace:
    path: /etc/pam.d/common-auth
    backup: true
    regexp: '(?m)^auth\s+\[success=2 default=ignore\]\s+pam_unix\.so nullok\s*\n^auth\s+\[success=1 default=ignore\]\s+pam_kanidm\.so ignore_unknown_user\s*$'
    replace: |
      auth    [success=2 default=ignore]    pam_kanidm.so ignore_unknown_user
      auth    [success=1 default=ignore]    pam_unix.so nullok

- name: Flush handlers before validation
  ansible.builtin.meta: flush_handlers

- name: Validate Kanidm login group resolution
  ansible.builtin.command: getent group {{ kanidm_login_groups[0] }}
  register: kanidm_group_lookup
  changed_when: false
  failed_when: false

- name: Show note if login group is not yet resolvable
  ansible.builtin.debug:
    msg: >-
      Kanidm group {{ kanidm_login_groups[0] }} was not resolved yet.
      Confirm POSIX is enabled for the group and anonymous read is allowed,
      or enable a service account token.
  when: kanidm_group_lookup.rc != 0

- name: Update CA trust
  ansible.builtin.command: update-ca-certificates
  changed_when: true

- name: Restart kanidm-unixd
  ansible.builtin.systemd:
    name: kanidm-unixd
    state: restarted

- name: Restart kanidm-unixd-tasks
  ansible.builtin.systemd:
    name: kanidm-unixd-tasks
    state: restarted

- name: Restart ssh
  ansible.builtin.systemd:
    name: ssh
    state: restarted

---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 0

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart sshd
  ansible.builtin.systemd:
    name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
    state: restarted

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted
    daemon_reload: yes

# --- Kanidm Client Handlers ---
- name: Update CA trust
  ansible.builtin.command: update-ca-certificates
  changed_when: true

- name: Run pam-auth-update
  ansible.builtin.command: pam-auth-update --package
  changed_when: false

- name: Restart kanidm-unixd
  ansible.builtin.systemd:
    name: kanidm-unixd
    state: restarted

- name: Restart kanidm-unixd-tasks
  ansible.builtin.systemd:
    name: kanidm-unixd-tasks
    state: restarted

- name: Restart ssh
  ansible.builtin.systemd:
    name: ssh
    state: restarted

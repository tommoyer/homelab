---
- name: Check if bootstrap user exists
  ansible.builtin.command: "getent passwd {{ homelab_ansible_user }}"
  register: _bootstrap_user_check
  failed_when: false
  changed_when: false

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - sudo
      - python3
      - python3-apt
      - aptitude
      - btop
      - vim
      - curl
      - dnsutils
      - ncdu
      - tree
      - tmux
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == "Debian"

- name: Create ansible group
  ansible.builtin.group:
    name: "{{ homelab_ansible_user }}"
    state: present

- name: Create ansible user
  ansible.builtin.user:
    name: "{{ homelab_ansible_user }}"
    group: "{{ homelab_ansible_user }}"
    groups: sudo
    shell: /bin/bash
    create_home: yes
    home: "{{ homelab_ansible_home }}"
    state: present

- name: Ensure ansible remote_tmp directory exists
  ansible.builtin.file:
    path: "{{ homelab_ansible_home }}/.ansible/tmp"
    state: directory
    owner: "{{ homelab_ansible_user }}"
    group: "{{ homelab_ansible_user }}"
    mode: '0700'

- name: Set up authorized_keys for ansible user
  ansible.posix.authorized_key:
    user: "{{ homelab_ansible_user }}"
    state: present
    key: "{{ lookup('file', homelab_ansible_ssh_pubkey_path) }}"
    exclusive: yes

- name: Configure passwordless sudo for ansible user
  ansible.builtin.copy:
    content: "{{ homelab_ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"
    dest: "/etc/sudoers.d/{{ homelab_ansible_user }}"
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Test ansible user sudo access
  ansible.builtin.command: sudo -l
  become: yes
  become_user: "{{ homelab_ansible_user }}"
  changed_when: false

- name: Remove getty/console autologin override
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/getty@tty1.service.d/override.conf
    - /etc/systemd/system/container-getty@1.service.d/override.conf
  notify: Reload systemd

- name: Enable PermitRootLogin and PasswordAuthentication in sshd_config
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?{{ item.regex }}'
    line: "{{ item.line }}"
    state: present
    backup: true
  loop:
    - { regex: 'PermitRootLogin', line: 'PermitRootLogin yes' }
    - { regex: 'PasswordAuthentication', line: 'PasswordAuthentication yes' }
  notify: Restart sshd
  when: _bootstrap_user_check.rc != 0

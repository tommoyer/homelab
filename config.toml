# Unified default configuration for the homelab Python package.
#
# Each tool reads its own section (e.g. [pihole], [mikrotik_dhcp_leases]).
# CLI flags always override values from this file.

[globals]
# Shared values used by multiple tools.

# Google Sheets CSV export URL (must contain gid=0; tools substitute their specific gids)
sheet_url = "https://docs.google.com/spreadsheets/d/1f4emn4uIPscEgOHtgmETODlTvz1eh2xZlnpBBNGQlWA/export?format=csv&gid=0"

# Sheet gids (used by multiple tools)
nodes_gid = 344016240
services_gid = 157827580

# DNS hostname of the Caddy server (used as a CNAME target by pihole when ingress=caddy)
caddy_hostname = "caddy.dmz.moyer.wtf"

# Caddy proxy IP in the DMZ VLAN (used by multiple tools)
caddy_ip = "192.168.20.2"

# Default MikroTik RouterOS connection target used by mikrotik-dhcp + mikrotik-firewall
mikrotik_host = "192.168.10.1"
mikrotik_user = "admin"

# Example overrides (optional):
# mikrotik_password_env = "MIKROTIK_PASSWORD"  # legacy alias for password_env

# MikroTik RouterOS SSH defaults (used by mikrotik-dhcp/mikrotik-firewall/mikrotik-backup)
ssh_port = 22

# Optional password env var to use with sshpass (leave empty to use SSH keys/agent)
password_env = "MIKROTIK_PASSWORD"

# Optional SSH key path (passed as -i). Leave empty to use your SSH agent/defaults.
ssh_identity_file = ""

# Public key used by Proxmox community-scripts when var_ssh=yes.
# This file is read by the deploy tool and injected into rendered pve-scripts/*.vars.
ssh_authorized_key_file = "~/.ssh/id_rsa.pub"

# Local backup destination (can be overridden per-device)
backup_dir = "./homelab/mikrotik/backups"

[pihole]
# Example overrides (optional):
# sheet_url = "https://.../export?format=csv&gid=0"  # defaults to globals.sheet_url
# nodes_gid = 344016240                               # defaults to globals.nodes_gid

# Template + output paths (relative paths resolve relative to this file)
template = "./homelab/pihole/pihole.toml.j2"
output = "./homelab/pihole/pihole.toml"

# Pi-hole instance SSH settings (used with --apply)
pihole_user = "root"
pihole_host = "192.168.10.11"

# Whether to use sudo for remote operations during --apply.
use_sudo = false


[mikrotik_backup.defaults]
# Inherit from [globals] (and legacy [mikrotik_defaults] if present) unless overridden here.

# When true, old backups are deleted before downloading a new one (--cleanup).
cleanup = true

# Number of existing backups to keep per device when cleanup is enabled (--keep).
keep = 3

# Example overrides (optional):
# ssh_port = 22
# user = "admin"
# password_env = "MIKROTIK_PASSWORD"
# ssh_identity_file = "~/.ssh/id_ed25519"
# backup_dir = "../mikrotik/backups"

[mikrotik_backup.devices.hexs]
host = "192.168.10.1"

[mikrotik_backup.devices.crs]
host = "192.168.10.2"

[mikrotik_backup.devices.cap_ax]
host = "192.168.10.3"


[mikrotik_dhcp_leases]
# Example overrides (optional; all default to [globals] if omitted):
# sheet_url = "https://.../export?format=csv&gid=0"
# nodes_gid = 344016240
# mikrotik_host = "192.168.10.1"
# mikrotik_user = "admin"
# ssh_port = 22
# password_env = "MIKROTIK_PASSWORD"
# ssh_identity_file = "~/.ssh/id_ed25519"
# backup_dir = "../mikrotik/backups"

# Nodes sheet column names
lease_type_column = "Static/DHCP"
ip_column = "IP Address"
subnet_column = "Subnet"
mac_column = "MAC Address"

# Output file containing RouterOS CLI commands
output = "./homelab/mikrotik/mikrotik-dhcp-leases.rsc"

# When running with --apply, the tool also downloads a full RouterOS /export
# and writes it to this directory.


[mikrotik_firewall]
# Uses the same sheet_url and nodes_gid as [mikrotik_dhcp_leases] by default.


# Example overrides (optional; all default to [globals] / [mikrotik_dhcp_leases] if omitted):
# sheet_url = "https://.../export?format=csv&gid=0"
# nodes_gid = 344016240
# mikrotik_host = "192.168.10.1"
# mikrotik_user = "admin"
# ssh_port = 22
# password_env = "MIKROTIK_PASSWORD"
# ssh_identity_file = "~/.ssh/id_ed25519"

# One or more Caddy proxy IPs in the DMZ VLAN.
# Defaults to [globals].caddy_ip if omitted. May also be provided at runtime via --caddy-ip.
# caddy_ips = ["192.168.20.2"]

# Interface names (match your RouterOS config).
dmz_interface = "vlan20-dmz"
homelab_interface = "vlan30-homelab"

# If an ingress=caddy row is missing backend_port, assume this port.
caddy_default_backend_port = 80

# Output script path
output = "./homelab/mikrotik/mikrotik-firewall.rsc"


[caddy]
# Caddyfile generator configuration.
# This section inherits from [globals] (e.g. sheet_url/nodes_gid) unless overridden here.



# Sheet configuration
# sheet_url = "https://.../export?format=csv&gid=0"  # defaults to globals.sheet_url
# caddy_gid = 0                                      # required (Services tab)
# nodes_gid = 344016240                              # optional (backend hostname->IP lookup)

# Filesystem paths
template = "./homelab/caddy/Caddyfile.j2"           # default: network.old/caddy/Caddyfile.template
output = "./homelab/caddy/Caddyfile"                     # default: network.old/caddy/downloads/Caddyfile
work_dir = "./homelab/caddy/downloads"                    # default: network.old/caddy/downloads
# dump_json = false

# Zones
caddy_zones = [
  { zone = "moyer.wtf", wildcard = true, redirect_www = false },
  { zone = "thomasmoyer.org", wildcard = true, redirect_www = false },
]

[caddy.caddy_deploy]
host = "caddy.dmz.moyer.wtf"              # ssh target host
username = "root"                          # ssh username
path = "/etc/caddy/Caddyfile"               # remote destination path
restart_command = "sudo systemctl reload caddy"  # command run over ssh
port = 22

# Optional deploy settings for --apply
# caddy_deploy = {
#   host = "caddy.example.com",
#   username = "root",
#   port = 22,
#   path = "/etc/caddy/Caddyfile",
#   restart_command = "systemctl reload caddy",
# }

[deploy]
proxmox_host = "192.168.10.10"
proxmox_user = "root@pam"
proxmox_password_env = "PROXMOX_PASSWORD"
